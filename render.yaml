services:
  - type: web
    name: my-shopping-api
    env: node
    plan: free
    buildCommand: npm install && npm run build --workspace=apps/api
    startCommand: npm run start:prod --workspace=apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        scope: build
      - key: JWT_SECRET
        scope: build
      - key: FRONTEND_URL
        scope: build
